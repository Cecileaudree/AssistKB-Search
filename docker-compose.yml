name: assistkb-search

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: assistkb-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  indexer:
    build: .
    container_name: assistkb-indexer
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - qdrant
    command: sh -c "sleep 5 && python -m app.embed"
    restart: "no"

  api:
    build: .
    container_name: assistkb-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - indexer
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  qdrant-data:
